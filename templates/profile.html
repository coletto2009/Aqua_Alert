<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Perfil</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='profile.css') }}">
</head>
<body>
  <nav>
    <a href="dashboard.html">Dashboard</a> |
    <a href="history.html">Histórico</a> |
    <a href="profile.html">Perfil</a> |
    <a href="/logout">Sair</a>
  </nav>
  <h1>Perfil do Usuário</h1>
  <section>
    <p>Nome: <span id="nomeUsuario">Carregando...</span></p>
    <p>Email: <span id="emailUsuario">Carregando...</span></p>
    <p>Aqui você pode editar seus dados ou visualizar informações da conta.</p>
  </section>
  <script>
    // Exemplo: buscar dados do usuário logado (ajuste conforme sua API)
    document.addEventListener("DOMContentLoaded", () => {
      fetch("/api/usuario")
        .then(res => res.json())
        .then(usuario => {
          document.getElementById("nomeUsuario").textContent = usuario.nome;
          document.getElementById("emailUsuario").textContent = usuario.email;
        });
    });
  </script>
</body>
</html>
